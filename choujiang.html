<title>彭诗喻专属抽奖</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#fff7fb,#f6f8ff);color:#222;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{width:min(94vw,460px);background:#fff;border-radius:28px;box-shadow:0 18px 60px rgba(0,0,0,.14);padding:24px 22px 26px;text-align:center;position:relative;overflow:hidden;}
.badge{display:inline-block;padding:6px 12px;border-radius:999px;background:#111;color:#fff;font-size:13px;margin-bottom:10px;}
h1{font-size:25px;margin:10px 0 8px}
p{font-size:15px;line-height:1.75;color:#555;margin:8px 0}
.hero{width:132px;height:132px;object-fit:cover;border-radius:22px;display:block;margin:10px auto 12px;box-shadow:0 10px 30px rgba(0,0,0,.12);}
.name{font-size:22px;font-weight:700;margin-top:2px}
.wheel-wrap{position:relative;width:300px;height:300px;margin:18px auto 10px}
.pointer{position:absolute;left:50%;top:-6px;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:28px solid #111;z-index:5;}
.wheel{width:300px;height:300px;border-radius:50%;border:10px solid #fff;box-shadow:0 10px 30px rgba(0,0,0,.12);background:conic-gradient(#ffd7ea 0deg 45deg,#fff0c7 45deg 90deg,#dff1ff 90deg 135deg,#e9ddff 135deg 180deg,#ffe3d8 180deg 225deg,#e4ffd9 225deg 270deg,#ffd7ea 270deg 315deg,#fff0c7 315deg 360deg);position:relative;transition:transform 4.3s cubic-bezier(.12,.9,.18,1);}
.center-btn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:#111;color:#fff;border:7px solid #fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 6px 20px rgba(0,0,0,.18);cursor:pointer;user-select:none;}
.slice-label{position:absolute;left:50%;top:50%;transform-origin:0 0;font-size:13px;font-weight:700;color:#444;width:92px;text-align:center;}
.result{margin-top:14px;padding:14px 16px;border-radius:18px;background:#fafafa;min-height:102px;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1.7;color:#333;}
.tip{font-size:13px;color:#888;margin-top:10px}
.count{font-size:13px;color:#666;margin-top:6px}
.confetti{position:absolute; inset:0; pointer-events:none; opacity:.08; background:radial-gradient(circle at 12% 20%, #111 0 6px, transparent 7px),radial-gradient(circle at 84% 22%, #ff9ccf 0 7px, transparent 8px),radial-gradient(circle at 22% 80%, #ffc96b 0 5px, transparent 6px),radial-gradient(circle at 76% 78%, #9ed2ff 0 8px, transparent 9px)}
.small{font-size:13px;color:#888}
</style>

    <div class="name">彭诗喻</div>
    <h1>今日幸运转盘已开启</h1>
    <p>前几次是随机结果，越往后越有惊喜。</p>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <div class="wheel" id="wheel">
        <div class="slice-label" style="transform: rotate(-67.5deg) translate(78px,-6px);">夸夸卡</div>
        <div class="slice-label" style="transform: rotate(-22.5deg) translate(78px,-6px);">好运签</div>
        <div class="slice-label" style="transform: rotate(22.5deg) translate(78px,-6px);">奶茶券</div>
        <div class="slice-label" style="transform: rotate(67.5deg) translate(78px,-6px);">再来一次</div>
        <div class="slice-label" style="transform: rotate(112.5deg) translate(78px,-6px);">小惊喜</div>
        <div class="slice-label" style="transform: rotate(157.5deg) translate(78px,-6px);">专属关注</div>
        <div class="slice-label" style="transform: rotate(202.5deg) translate(78px,-6px);">心动信号</div>
        <div class="slice-label" style="transform: rotate(247.5deg) translate(78px,-6px);">隐藏大奖</div>
      </div>
      <div class="center-btn" id="spinBtn">开始</div>
    </div>

    <div class="result" id="resultBox">准备好了吗？点击开始，看看你会抽到什么专属结果。</div>
    <div class="count" id="countBox">当前抽奖次数：0</div>
    <div class="tip">温馨提示：越往后，系统越容易给你好结果</div>
  </div>

<script>
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const resultBox = document.getElementById('resultBox');
const countBox = document.getElementById('countBox');
let spinning = false;
let spinCount = 0;
const outcomes = [
  { key: '夸夸卡', text: '恭喜抽中【夸夸卡】<br><span class="small">今天的你，状态很好，适合被夸。</span>', target: 0 },
  { key: '好运签', text: '恭喜抽中【好运签】<br><span class="small">接下来会有一点小幸运，心情加分。</span>', target: 45 },
  { key: '奶茶愿望券', text: '恭喜抽中【奶茶愿望券】<br><span class="small">先存档在我这里，下次有机会兑现。</span>', target: 90 },
  { key: '再来一次', text: '抽中【再来一次】<br><span class="small">这次是热身，重新抽更有意思。</span>', target: 135 },
  { key: '小惊喜', text: '恭喜抽中【小惊喜】<br><span class="small">获得“今日有点特别”认证。</span>', target: 180 },
  { key: '专属关注奖', text: '恭喜抽中【专属关注奖】<br><span class="small">系统显示，今天有人对你格外上心。</span>', target: 225 },
  { key: '心动信号奖', text: '恭喜抽中【心动信号奖】<br><span class="small">检测到你今天有点让人想多看两眼。</span>', target: 270 },
  { key: '隐藏大奖', text: '恭喜抽中【隐藏大奖】<br><span class="small">你成为了今日专属整蛊对象，但也是我最想留到最后的那个结果。</span>', target: 315 }
];
function weightedRandom() {
  const r = Math.random() * 100;
  if (r < 18) return outcomes[0];
  if (r < 34) return outcomes[1];
  if (r < 48) return outcomes[2];
  if (r < 62) return outcomes[3];
  if (r < 74) return outcomes[4];
  if (r < 84) return outcomes[5];
  if (r < 94) return outcomes[6];
  return outcomes[7];
}
function getOutcomeByCount(count) {
  if (count <= 5) return weightedRandom();
  if (count === 6) return outcomes[2];
  if (count === 7) return outcomes[5];
  return outcomes[7];
}
function spinToOutcome(outcome) {
  const extra = Math.floor(Math.random() * 20) - 10;
  const finalDeg = 360 * (5 + Math.floor(Math.random() * 2)) + outcome.target + extra;
  wheel.style.transform = 'rotate(' + finalDeg + 'deg)';
}
spinBtn.addEventListener('click', function() {
  if (spinning) return;
  spinning = true;
  spinCount += 1;
  countBox.textContent = '当前抽奖次数：' + spinCount;
  const outcome = getOutcomeByCount(spinCount);
  resultBox.innerHTML = '抽奖中…<br><span class="small">系统正在为你匹配专属结果。</span>';
  spinToOutcome(outcome);
  setTimeout(() => {
    resultBox.innerHTML = outcome.text;
    if (spinCount >= 8) {
      resultBox.innerHTML = '恭喜抽中【隐藏大奖】<br><span class="small">前面让你抽了这么多次，不是因为系统卡了，是因为想让你多玩一会儿。愚人节快乐。</span>';
    }
    spinning = false;
  }, 4400);
});
</script>
